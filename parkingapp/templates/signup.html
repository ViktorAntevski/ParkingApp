{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h2>Create an Account</h2>

<label>Username:<br>
  <input type="text" id="username" required>
</label><br><br>

<label>Password:<br>
  <input type="password" id="password" required>
</label><br><br>

<label>Full name:<br>
  <input type="text" id="name_surname">
</label><br><br>

<label>Address:<br>
  <input type="text" id="address">
</label><br><br>

<label>Phone number:<br>
  <input type="text" id="phone_number">
</label><br><br>

<label>Email:<br>
  <input type="email" id="email_address">
</label><br><br>

<label>ID card:<br>
  <input type="text" id="ID_card">
</label><br><br>

<button onclick="signUp()">Sign Up</button>
{% endblock %}

{% block scripts %}
<script>
function signUp() {
  fetch("/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value,
      name_surname: document.getElementById("name_surname").value,
      address: document.getElementById("address").value,
      phone_number: document.getElementById("phone_number").value,
      email_address: document.getElementById("email_address").value,
      ID_card: document.getElementById("ID_card").value
    })
  })
  .then(res => {return res.json().then(data => ({data, res}));
  })
  .then(({res,data}) => {
    if (res.ok) {
      sessionStorage.setItem("toast", data.message);
      window.location.href = "/";
      document.getElementById("error").innerText = data.message;
    }
      else {
      alert(data.message);
    }
  })
  .catch(err => {
  document.getElementById("error").innerText = "Server error";
  console.error(err);
  });
  }
</script>
{% endblock %}
