{% extends "base/auth.html" %}

{% block title %} Skopje Parking App{% endblock %}

{% block content %}
    <h2>Welcome</h2>

    <p>
        <a href="{{ url_for('pages.signup_page') }}">Sign Up</a>
    </p>

    <p>
        <a href="{{ url_for('pages.login_page') }}">Log In</a>
    </p>

    <p>
        <a href="{{ url_for('pages.operator_login') }}">Operator Log In</a>
    </p>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  const msg = sessionStorage.getItem("toast");

  if (msg) {
    sessionStorage.removeItem("toast");

    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display = "block";

    setTimeout(() => {
      toast.style.display = "none";
    }, 3000); // 3 seconds
  }
});
</script>
{% endblock %}
