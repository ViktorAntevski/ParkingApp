{% extends "base/auth.html" %}

{% block title %}Operator Login{% endblock %}

{% block content %}
<h2>Login</h2>

 <p>Use: username: operator, password: operatoronduty123, zone:Z1/Z2/Z3</p>

<label>
  Username<br>
  <input type="text" id="username" required>
</label><br><br>

<label>
  Password<br>
  <input type="password" id="password" required>
</label><br><br>

<label>
  Zone<br>
  <input type="text" id="zone" required>
</label><br><br>

<button type="button" onclick="login()">Login</button>

<p id="error" style="color:red;"></p>
{% endblock %}


{% block scripts %}
<script>
function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const zone = document.getElementById("zone").value;
  const errorEl = document.getElementById("error");

  fetch("/operator-login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      password: password,
      zone: zone
    })
  })
  .then(async response => {
    const data = await response.json();

    if (!response.ok) {
      if (data.redirect) {
        window.location.href = data.redirect;
    } else {
      errorEl.innerText = data.message || "Login failed";
      }
    return;
  }
      sessionStorage.setItem("toast", data.message);

      localStorage.setItem("user_id", data.user_id);
      localStorage.setItem("username", data.username);
      localStorage.setItem("is_verified", data.is_verified);

      window.location.href = "/operator";

  })
  .catch(err => {
    document.getElementById("error").innerText = "Server error";
    console.error(err);
  });
  }
</script>
{% endblock %}
