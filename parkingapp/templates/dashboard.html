
{% extends "dashboard_base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

    <h2>Welcome, {{ user.username }}</h2>

    <p>Select a service:</p>


<a href="{{ url_for('/dashboard.hourly_parking') }}">
    <button>Hourly parking</button>
</a><br><br>

<a href="{{ url_for('/dashboard.subscribe_monthly') }}">
    <button>Subscribe monthly</button>
</a><br><br>

<a href="{{ url_for('/dashboard.reg_for_res') }}">
    <button>Register a resident vehicle</button>
</a><br><br>

<a href="{{ url_for('/dashboard.price_list') }}">
    <button>Service price list</button>
</a><br><br>

<a href="{{ url_for('/dashboard.stop_parking') }}">
    <button>Stop Parking</button>
</a><br><br>

{% endblock %}
{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  const msg = sessionStorage.getItem("toast");

  if (msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.display = "block";
    sessionStorage.removeItem("toast");

    setTimeout(() => {
      toast.style.display = "none";
    }, 3000); // 3 seconds
  }
});
</script>

{% endblock %}
