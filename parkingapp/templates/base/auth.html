<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Skopje Parking App{% endblock %}</title>
</head>

<body>

    <div id="toast" style="
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #2ecc71;
  color: white;
  padding: 12px 20px;
  border-radius: 6px;
  display: none;
  z-index: 9999;
    ">
    </div>
    <header>
        <h1>Parking App</h1>
        <hr>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
{% block scripts %}{% endblock %}
</body>
</html>
