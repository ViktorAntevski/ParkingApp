    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Skopje Parking App{% endblock %}</title>

        <style>
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px 20px;
                border-bottom: 1px solid #ccc;
            }

            .user-bar {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            main {
                padding: 20px;
            }
        </style>
    </head>

    <body>
        <!-- Toast -->
        <div id="toast"
             style="
               position: fixed;
               top: 20px;
               left: 50%;
               transform: translateX(-50%);
               background: #2ecc71;
               color: white;
               padding: 12px 20px;
               border-radius: 6px;
               display: none;
               z-index: 9999;">
        </div>

        <!-- HEADER -->
        <header>
            <!-- Left side -->
            <h1>Parking App</h1>

            <!-- Right side -->
            <div class="user-bar">
                <span>
                    Logged in as <strong>{{ current_user.username }}</strong><br><br>
                </span>
                <button onclick="logout()">Log out</button>
                <span>
                    You are currently working in zone <strong>{{ session.get("operator_zone", "N/A") }}</strong><br><br>
                </span>
                <button onclick="Z1()">Z1</button>
                <button onclick="Z2()">Z2</button>
                <button onclick="Z3()">Z3</button>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <main>
            {% block content %}{% endblock %}
        </main>

        {% block scripts %} {% endblock %}

        <script>
            async function logout() {
                try {
                const response = await fetch("/logout", {
                    method: "POST"
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.removeItem("user_id");
                    localStorage.removeItem("username");
                    sessionStorage.setItem("toast", data.message);
                        window.location.href = "/";
                } else {
                        alert(data.message || "Logout failed");
                }
            }   catch(err) {
                    console.error("Logout error:", err);
                    alert("Server error during logout");
            }
        }
            function Z1() {
              fetch("/operator/change-zone", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  zone: "Z1",
                })
              })
              .then(res => {return res.json().then(data => ({data, res}));
              })
              .then(({res,data}) => {
                if (res.ok) {
                  window.location.href = "/operator";
                }
                    else {
                    alert(data.message);
                    }
                  })
              .catch(err => {
                 document.getElementById("error").innerText = "Server error";
                 console.error(err);
                 });
                 }
            function Z2() {
              fetch("/operator/change-zone", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  zone: "Z2",
                })
              })
              .then(res => {return res.json().then(data => ({data, res}));
              })
              .then(({res,data}) => {
                if (res.ok) {
                  window.location.href = "/operator";
                }
                    else {
                    alert(data.message);
                    }
                  })
              .catch(err => {
                 document.getElementById("error").innerText = "Server error";
                 console.error(err);
                 });
                 }
            function Z3() {
              fetch("/operator/change-zone", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  zone: "Z3",
                })
              })
              .then(res => {return res.json().then(data => ({data, res}));
              })
              .then(({res,data}) => {
                if (res.ok) {
                  window.location.href = "/operator";
                }
                    else {
                    alert(data.message);
                    }
                  })
              .catch(err => {
                 document.getElementById("error").innerText = "Server error";
                 console.error(err);
                 });
                 }
        </script>

    </body>
    </html>
