{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
    <h2>Log In</h2>

    <form method="post" action="/login">
        <label>
            Username:<br>
            <input type="text" name="username" required>
        </label>
        <br><br>

        <label>
            Password:<br>
            <input type="password" name="password" required>
        </label>
        <br><br>

        <button type="submit">Log In</button>
    </form>
{% endblock %}
